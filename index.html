<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ミステリーハウス レトロADV</title>
<style>
    :root {
        --c-bg: #000000;
        --c-white: #FFFFFF;
        --c-green: #00FF00;
        --c-cyan: #00FFFF;
    }
    html, body {
        width: 100%;
        height: 100%; /* JSでビューポート高さに動的調整します */
        margin: 0;
        padding: 0;
        overflow: hidden;
        position: fixed;
        background-color: #111;
        font-family: 'Courier New', Courier, monospace, sans-serif;
        overscroll-behavior: none; /* バウンススクロール防止 */
        touch-action: none; /* 全体のスワイプ（画面引きずり）を防止 */
    }
    #game-container {
        max-width: 640px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        height: 100%;
        border-left: 1px solid #333;
        border-right: 1px solid #333;
        box-sizing: border-box;
        background-color: var(--c-bg);
        position: relative;
        padding-bottom: env(safe-area-inset-bottom, 0px); /* iOS Safari等の下部セーフエリア対策 */
    }
    /* グラフィック画面 */
    canvas {
        width: 100%;
        height: auto;
        max-height: 35vh; 
        object-fit: contain;
        background-color: var(--c-bg);
        border-bottom: 2px solid var(--c-white);
        image-rendering: pixelated;
        flex: 0 0 auto;
        cursor: pointer;
    }
    
    /* コマンド入力フォーム */
    #cmd-form {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 6px;
        background-color: #222;
        border-bottom: 1px solid #555;
        flex: 0 0 auto;
    }
    .form-row { display: flex; gap: 4px; width: 100%; align-items: center; }
    
    #cmd-input {
        flex: 1; background-color: #000; color: #FFF; border: 1px solid var(--c-white);
        padding: 8px; font-family: inherit; font-size: 16px; border-radius: 4px;
        caret-color: transparent; min-width: 0;
    }
    #cmd-input.typing { caret-color: #FFF; }
    #cmd-input:focus { outline: none; box-shadow: 0 0 5px var(--c-white); }
    
    /* 入力欄横のボタン類 */
    .action-btn {
        background-color: #333; color: #FFF; border: 1px solid #555; border-radius: 4px; 
        padding: 8px 6px; font-weight: bold; font-size: 13px; cursor: pointer;
        touch-action: manipulation; transition: transform 0.1s;
        white-space: nowrap; flex: 0 0 auto;
        user-select: none; -webkit-user-select: none;
    }
    .action-btn:active { transform: scale(0.92); background-color: #555; }
    .cmd-submit { background-color: var(--c-white); color: #000; border-color: var(--c-white); padding: 8px 10px; }
    
    /* メッセージ領域 */
    #log-container {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 8px 10px;
        font-size: 13px;
        line-height: 1.5;
        color: var(--c-white);
        white-space: pre-wrap;
        min-height: 60px;
        touch-action: pan-y; /* 縦スクロールのみ許可 */
    }
    #log-container p { margin: 0 0 6px 0; }
    
    /* コントロール全体（下部） */
    #controls {
        flex: 0 0 auto;
        padding: 4px 4px 8px 4px;
        background: #111;
        border-top: 1px solid #555;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    /* 横スクロール領域 */
    .scroll-row {
        display: flex; overflow-x: auto; gap: 6px; padding: 2px 0;
        scrollbar-width: none; 
        touch-action: pan-x; /* 横スクロールのみ許可 */
    }
    .scroll-row::-webkit-scrollbar { display: none; }
    
    /* タブ・ボタン共通 */
    .cat-btn {
        flex: 1; padding: 8px 0; background-color: #222; color: #aaa;
        border: 1px solid #444; border-radius: 4px; font-size: 13px; font-weight: bold;
        text-align: center; cursor: pointer; touch-action: manipulation;
        transition: transform 0.1s;
    }
    .cat-btn.submit {
        flex: 0 0 auto; padding: 8px 12px; background-color: var(--c-white); color: #000; border-color: var(--c-white);
    }
    .cat-btn:active { transform: scale(0.92); }
    .cat-btn.active { background-color: #555; color: #fff; border-color: #777; }
    
    .item-btn {
        flex: 0 0 auto; padding: 6px 12px; background-color: #000;
        border: 1px solid #555; border-radius: 4px; font-size: 14px;
        font-weight: bold; white-space: nowrap; cursor: pointer; touch-action: manipulation;
    }
    .item-btn:active { transform: scale(0.92); background-color: #333; }
    .item-btn.verb { border-color: var(--c-green); color: var(--c-green); }
    .item-btn.noun { border-color: var(--c-cyan); color: var(--c-cyan); }
    .item-btn.other { border-color: var(--c-white); color: var(--c-white); }
    
    /* 常時表示の特殊キー */
    .special-keys { display: flex; gap: 4px; }
    .special-btn {
        flex: 1; padding: 6px 0; background-color: #2a2a2a; color: #fff;
        border: 1px solid #555; border-radius: 4px; font-size: 13px; font-weight: bold;
        text-align: center; cursor: pointer; touch-action: manipulation;
        user-select: none; -webkit-user-select: none;
    }
    .special-btn:active { background-color: #555; transform: scale(0.95); }

    /* ガラケー風仮想キーボード */
    #kb-toggle-container {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 4px;
    }
    .kb-toggle-btn {
        padding: 8px 0; background-color: #222; color: #fff;
        border: 1px solid #444; border-radius: 4px; font-size: 15px; font-weight: bold;
        text-align: center; cursor: pointer; touch-action: manipulation;
        transition: transform 0.1s;
    }
    .kb-toggle-btn:active { background-color: #444; transform: scale(0.92); }

    /* フル五十音キーボード */
    #kb-full-container {
        display: none; 
        flex-direction: row-reverse;
        justify-content: space-between;
        gap: 2px;
    }
    .kb-col {
        display: flex;
        flex-direction: column;
        flex: 1;
        gap: 2px;
    }
    .kb-full-btn {
        padding: 6px 0; background-color: #222; color: #fff;
        border: 1px solid #444; border-radius: 4px; font-size: 13px; font-weight: bold;
        text-align: center; cursor: pointer; touch-action: manipulation;
        transition: transform 0.1s; user-select: none; -webkit-user-select: none;
    }
    .kb-full-btn:active { background-color: #444; transform: scale(0.92); }

    /* 最下部ボタン */
    #bottom-actions {
        display: flex;
        gap: 4px;
        margin-top: 2px;
    }
    .bottom-btn {
        flex: 1; padding: 10px 0; font-size: 13px; font-weight: bold; border-radius: 4px;
        cursor: pointer; touch-action: manipulation; transition: transform 0.1s; border: none;
        user-select: none; -webkit-user-select: none;
    }
    .bottom-btn:active { transform: scale(0.95); }
    .btn-action-dark { background-color: #2a2a2a; color: #FFF; border: 1px solid #555; }
    .btn-history { background-color: #444; color: #FFF; border: 1px solid #555; }
    .btn-submit { background-color: var(--c-white); color: #000; }

</style>
</head>
<body>

<div id="game-container">
    <!-- グラフィック -->
    <canvas id="screen" width="640" height="400"></canvas>
    
    <!-- 入力フォーム -->
    <form id="cmd-form" onsubmit="event.preventDefault(); submitCommand();">
        <div class="form-row">
            <input type="text" id="cmd-input" placeholder="コマンド入力" inputmode="none" autocomplete="off" oninput="checkTyping()">
            <button type="button" class="action-btn" id="bs-btn-top" title="BS">BS</button>
            <button type="button" class="action-btn" id="history-btn-top" onclick="showHistory()" title="履歴">履歴</button>
            <button type="button" class="action-btn" id="os-kb-btn" onclick="switchKeyboardMode()" title="キーボード切替">📱</button>
            <button type="submit" class="action-btn cmd-submit">実行</button>
        </div>
    </form>
    
    <!-- メッセージ -->
    <div id="log-container"></div>
    
    <!-- コントロールパネル -->
    <div id="controls">
        <div id="cmd-section" style="display: flex; flex-direction: column; gap: 4px;">
            <div class="scroll-row" id="cmd-tabs" style="display: flex;">
                <button type="button" class="cat-btn submit" onclick="submitCommand()">実行</button>
                <button type="button" class="cat-btn cmd-cat-btn" id="cat-イドウ" onclick="showCmdCategory('イドウ')">イドウ</button>
                <button type="button" class="cat-btn cmd-cat-btn" id="cat-ドウシ" onclick="showCmdCategory('ドウシ')">ドウシ</button>
                <button type="button" class="cat-btn cmd-cat-btn" id="cat-メイシ" onclick="showCmdCategory('メイシ')">メイシ</button>
                <button type="button" class="cat-btn cmd-cat-btn" id="cat-ソノタ" onclick="showCmdCategory('ソノタ')">ソノタ</button>
            </div>
            <div id="cmd-items" class="scroll-row"></div>
        </div>

        <div id="keyboard-area">
            <div class="special-keys" id="special-keys-container">
                <button type="button" class="special-btn" onclick="typeSpecial('゛')">゛(濁点)</button>
                <button type="button" class="special-btn" onclick="typeSpecial('゜')">゜(半濁)</button>
                <button type="button" class="special-btn" onclick="typeSpecial('ー')">ー</button>
                <button type="button" class="special-btn" id="bs-btn">BS</button>
            </div>

            <div id="kb-toggle-container">
                <button type="button" class="kb-toggle-btn" onclick="handleKbToggle(event, 'ア')">ア行</button>
                <button type="button" class="kb-toggle-btn" onclick="handleKbToggle(event, 'カ')">カ行</button>
                <button type="button" class="kb-toggle-btn" onclick="handleKbToggle(event, 'サ')">サ行</button>
                <button type="button" class="kb-toggle-btn" onclick="handleKbToggle(event, 'タ')">タ行</button>
                <button type="button" class="kb-toggle-btn" onclick="handleKbToggle(event, 'ナ')">ナ行</button>
                <button type="button" class="kb-toggle-btn" onclick="handleKbToggle(event, 'ハ')">ハ行</button>
                <button type="button" class="kb-toggle-btn" onclick="handleKbToggle(event, 'マ')">マ行</button>
                <button type="button" class="kb-toggle-btn" onclick="handleKbToggle(event, 'ヤ')">ヤ行</button>
                <button type="button" class="kb-toggle-btn" onclick="handleKbToggle(event, 'ラ')">ラ行</button>
                <button type="button" class="kb-toggle-btn" onclick="handleKbToggle(event, 'ワ')">ワ行</button>
            </div>

            <div id="kb-full-container"></div>
            
            <div id="bottom-actions">
                <button type="button" class="bottom-btn btn-submit" onclick="submitCommand()">実行</button>
                <button type="button" class="bottom-btn btn-action-dark" onclick="typeSpecial('空')">空白</button>
                <button type="button" class="bottom-btn btn-action-dark" onclick="typeSpecial('小')">小文字</button>
                <button type="button" class="bottom-btn btn-history" onclick="showHistory()">履歴</button>
                <button type="button" class="bottom-btn btn-submit" onclick="submitCommand()">実行</button>
            </div>
        </div>
    </div>
</div>

<script>
// --- iOS Safari 等の表示領域調整・キーボード対策 ---
const scrollLogToBottom = () => {
    const logDiv = document.getElementById('log-container');
    if (logDiv) {
        logDiv.scrollTop = logDiv.scrollHeight;
    }
};

const adjustViewport = () => {
    let vh = window.innerHeight;
    // 仮想キーボード展開時などの実効高さを取得
    if (window.visualViewport) {
        vh = window.visualViewport.height;
    }
    document.documentElement.style.height = vh + 'px';
    document.body.style.height = vh + 'px';
    window.scrollTo(0, 0);
    
    // レイアウト再計算後にログを最下部へ
    setTimeout(scrollLogToBottom, 50);
};

if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', adjustViewport);
    window.visualViewport.addEventListener('scroll', adjustViewport);
}
window.addEventListener('resize', adjustViewport);
adjustViewport(); // 初期化

// OSキーボード表示時のスクロール調整
document.getElementById('cmd-input').addEventListener('focus', () => {
    // OSキーボードが競り上がるアニメーションを考慮し、時間差で複数回実行
    setTimeout(scrollLogToBottom, 50);
    setTimeout(scrollLogToBottom, 300);
});

// --- カラー定義 ---
const COLORS = {
    BLACK: '#000000', WHITE: '#FFFFFF', RED: '#FF0000', CYAN: '#00FFFF',
    BLUE: '#0000FF', YELLOW: '#FFFF00', GREEN: '#00FF00', MAGENTA: '#FF00FF'
};

// --- ゲーム状態 ---
let state = {};
let items = {};
let cmdHistory = [];
let historyIndex = -1;
let keyboardMode = 0;
let isOSEnabled = false;

function resetState() {
    state = {
        screen: 'title', currentRoom: 'front', facing: 'N', visitedRooms: ['front'],
        treasureRoom: 'basement',
        flags: { frontDoorOpen: false, fridgeOpen: false, chestOpened: false, darkRoomLight: false, wallBroken: false, trapdoorOpen: false }
    };
    items = {
        'メモ': { name: 'メモ', location: 'hall' },
        'カギ': { name: 'カギ', location: 'hidden' },
        'マッチ': { name: 'マッチ', location: 'hidden' },
        'ハンマー': { name: 'ハンマー', location: 'hidden' },
        'バール': { name: 'バール', location: 'hidden' },
        'タカラ': { name: 'タカラ', location: 'hidden' },
        'ホウセキ': { name: 'ホウセキ', location: 'hidden_room' }
    };
    cmdHistory = [];
}
resetState();

// --- ローカルセーブ＆ロード (localStorage) ---
const SAVE_KEY = 'mystery_house_save_data';

function saveGame() {
    commitToggle();
    if (state.screen === 'title' || state.screen === 'clear') {
        printLog("ココ デハ セーブ デキナイ。", COLORS.RED);
        return;
    }
    
    try {
        const dataToSave = {
            s: state,
            i: items,
            h: cmdHistory
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(dataToSave));
        printLog("セーブ ニ セイコウ シマシタ！", COLORS.GREEN);
    } catch (e) {
        console.error("Save error:", e);
        printLog("セーブ ニ シッパイ シマシタ。ブラウザ ノ セッテイ オ カクニン シテ クダサイ。", COLORS.RED);
    }
}

function loadGame() {
    commitToggle();
    try {
        const savedDataStr = localStorage.getItem(SAVE_KEY);
        if (savedDataStr) {
            const data = JSON.parse(savedDataStr);
            if (data && data.s && data.i) {
                state = data.s;
                items = data.i;
                cmdHistory = data.h || [];
                historyIndex = -1;
                
                printLog("ロード ニ セイコウ シマシタ！", COLORS.GREEN);
                if (state.screen === 'title') {
                    state.screen = 'play';
                }
                drawCurrentRoom();
                if (state.screen === 'play') look();
                return;
            }
        }
        printLog("セーブデータ ガ アリマセン。", COLORS.RED);
    } catch (e) {
        console.error("Load error:", e);
        printLog("ロード ニ シッパイ シマシタ。データ ガ コワレテイル カモ シレマセン。", COLORS.RED);
    }
}

// --- アイテムのランダム配置とヒント生成 ---
function initHiddenItems() {
    const hiddenSpots = ['fridge', 'kitchen_table', 'dining_table', 'study_books', 'hall_stairs', 'kids_toy', 'bed', 'closet', 'window'];
    for (let i = hiddenSpots.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [hiddenSpots[i], hiddenSpots[j]] = [hiddenSpots[j], hiddenSpots[i]];
    }
    items['カギ'].location = hiddenSpots[0];
    items['マッチ'].location = hiddenSpots[1];
    items['ハンマー'].location = hiddenSpots[2];
    items['バール'].location = hiddenSpots[3];

    const treasureRooms = ['basement', 'study', 'dark_room', 'hidden_room', 'dining'];
    state.treasureRoom = treasureRooms[Math.floor(Math.random() * treasureRooms.length)];
}

function getSpotHint(spot) {
    const names = {
        'fridge':'ツメタイ トビラ ノ ナカ',
        'kitchen_table':'メシ ヲ ツクル ヘヤ ノ ウエ',
        'dining_table':'ショクタク ノ シタ',
        'study_books':'チシキ ノ ヤマ ノ スキマ',
        'hall_stairs':'ウエ ヘ ツヅク ミチ ノ ウラ',
        'kids_toy':'アソビ ドウグ ノ ナカ',
        'bed':'ネムリ ニ ツク バショ ノ シタ',
        'closet':'フク ヲ シマウ トビラ ノ ナカ',
        'window':'ソト ヲ ミル バショ ノ スミ'
    };
    return names[spot] || "ドコカ";
}

function getRoomHint(room) {
    const names = {
        'basement': 'ヒカリ トドカヌ チテイ',
        'study': 'ホン ニ カコマレタ クウカン',
        'dark_room': 'アカリ ノ ナイ トコロ',
        'hidden_room': 'カベ ノ ムコウガワ',
        'dining': 'ショクタク ノ アル ヘヤ'
    };
    return names[room] || "ドコカ";
}

function checkHiddenItem(spot, roomName) {
    let found = [];
    for (const key in items) {
        if (items[key].location === spot) {
            items[key].location = roomName;
            found.push(items[key].name);
        }
    }
    if (found.length > 0) {
        printLog("ナカ カラ " + found.join(' ト ') + " ガ デテキタ！", COLORS.CYAN);
        drawCurrentRoom();
    } else printLog("トクニ メボシイ モノ ハ ナイ。");
}

// --- 描画系ユーティリティ ---
function drawPoly(ctx, points, fillColor, strokeColor = COLORS.WHITE) {
    if (points.length < 2) return;
    ctx.beginPath(); ctx.moveTo(points[0][0], points[0][1]);
    for(let i=1; i<points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
    ctx.closePath();
    if(fillColor) { ctx.fillStyle = fillColor; ctx.fill(); }
    if(strokeColor) { ctx.strokeStyle = strokeColor; ctx.lineWidth = 2; ctx.stroke(); }
}
function drawLine(ctx, x1, y1, x2, y2, color = COLORS.WHITE) {
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
}
function drawText(ctx, text, x, y, size, color, outline = false) {
    ctx.font = `bold ${size}px monospace`;
    if (outline) { ctx.strokeStyle = COLORS.BLACK; ctx.lineWidth = 3; ctx.strokeText(text, x, y); }
    ctx.fillStyle = color; ctx.fillText(text, x, y);
}

function drawTitle(ctx) {
    ctx.clearRect(0, 0, 640, 400); ctx.textAlign = 'left';
    drawText(ctx, "MYSTERY", 30, 80, 70, COLORS.BLUE);
    ctx.lineWidth = 1; ctx.strokeStyle = COLORS.RED; ctx.strokeText("MYSTERY", 30, 80);
    drawText(ctx, "HOUSE", 80, 160, 70, COLORS.BLUE);
    ctx.strokeStyle = COLORS.RED; ctx.strokeText("HOUSE", 80, 160);

    drawPoly(ctx, [[280, 330], [400, 280], [400, 400], [280, 400]], COLORS.CYAN, COLORS.WHITE);
    drawPoly(ctx, [[400, 280], [580, 320], [580, 400], [400, 400]], COLORS.BLUE, COLORS.WHITE); 
    drawPoly(ctx, [[350, 190], [440, 150], [440, 290], [350, 330]], COLORS.CYAN, COLORS.WHITE);
    drawPoly(ctx, [[440, 150], [560, 180], [560, 315], [440, 290]], COLORS.BLUE, COLORS.WHITE);

    drawPoly(ctx, [[280, 330], [350, 300], [350, 270], [280, 300]], COLORS.BLACK, COLORS.WHITE);
    drawLine(ctx, 290, 325, 290, 295); drawLine(ctx, 310, 315, 310, 285); drawLine(ctx, 330, 308, 330, 278);
    drawPoly(ctx, [[350, 300], [400, 280], [400, 250], [350, 270]], COLORS.BLACK, COLORS.WHITE);
    drawLine(ctx, 370, 290, 370, 260); drawLine(ctx, 390, 282, 390, 252);

    drawPoly(ctx, [[510, 120], [520, 120], [520, 140], [510, 140]], COLORS.RED, COLORS.WHITE);
    drawPoly(ctx, [[440, 80], [440, 150], [350, 190]], COLORS.CYAN, COLORS.WHITE); 
    drawPoly(ctx, [[440, 80], [560, 110], [560, 180], [440, 150]], COLORS.RED, COLORS.WHITE); 
    
    drawPoly(ctx, [[460, 310], [500, 320], [500, 380], [460, 370]], COLORS.BLACK, COLORS.WHITE);
    drawPoly(ctx, [[470, 320], [490, 325], [490, 340], [470, 335]], null, COLORS.WHITE); 
    
    drawPoly(ctx, [[300, 340], [340, 320], [340, 360], [300, 380]], COLORS.BLACK, COLORS.WHITE);
    drawLine(ctx, 320, 330, 320, 370); drawLine(ctx, 300, 360, 340, 340);

    drawPoly(ctx, [[370, 220], [410, 200], [410, 240], [370, 260]], COLORS.BLACK, COLORS.WHITE);
    drawLine(ctx, 390, 210, 390, 250); drawLine(ctx, 370, 240, 410, 220);

    drawPoly(ctx, [[460, 200], [490, 210], [490, 250], [460, 240]], COLORS.BLACK, COLORS.WHITE);
    drawLine(ctx, 475, 205, 475, 245); drawLine(ctx, 460, 220, 490, 230);
    
    drawPoly(ctx, [[510, 210], [540, 220], [540, 260], [510, 250]], COLORS.BLACK, COLORS.WHITE);
    drawLine(ctx, 525, 215, 525, 255); drawLine(ctx, 510, 230, 540, 240);
}

function drawCompass(ctx) {
    const cx = 590, cy = 40;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; ctx.fillRect(cx - 35, cy - 35, 70, 70);
    const dirs = ['N', 'E', 'S', 'W'];
    let topIndex = dirs.indexOf(state.facing);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    drawText(ctx, dirs[topIndex], cx, cy - 20, 18, COLORS.YELLOW, true);
    drawText(ctx, dirs[(topIndex + 3) % 4], cx - 20, cy, 18, COLORS.WHITE, true);
    drawText(ctx, "+", cx, cy, 18, COLORS.WHITE, true);
    drawText(ctx, dirs[(topIndex + 1) % 4], cx + 20, cy, 18, COLORS.WHITE, true);
    drawText(ctx, dirs[(topIndex + 2) % 4], cx, cy + 20, 18, COLORS.WHITE, true);
    ctx.textBaseline = 'alphabetic';
}

function drawMap(ctx) {
    ctx.fillStyle = COLORS.BLACK; ctx.fillRect(0, 0, 640, 400);
    ctx.textAlign = 'center'; drawText(ctx, "--- MAP ---", 320, 40, 24, COLORS.CYAN); 
    drawCompass(ctx);
    
    const mapCoords = {
        'front': { x: 320, y: 340 }, 'hall': { x: 320, y: 250 }, 'kitchen': { x: 180, y: 250 },
        'dining': { x: 180, y: 340 }, 'dark_room': { x: 460, y: 250 }, 'study': { x: 320, y: 160 },
        'basement': { x: 460, y: 340 },
        'corridor_2f': { x: 440, y: 140 }, 'kids_room': { x: 440, y: 60 }, 'bedroom': { x: 540, y: 140 },
        'hidden_room': { x: 540, y: 60 }
    };
    ctx.strokeStyle = COLORS.WHITE; ctx.lineWidth = 4;
    for (const roomKey of state.visitedRooms) {
        const coords = mapCoords[roomKey]; const room = rooms[roomKey];
        ['キタ', 'ミナミ', 'ヒガシ', 'ニシ'].forEach(dir => {
            const nextRoom = room.exits[dir];
            if (nextRoom && state.visitedRooms.includes(nextRoom)) {
                ctx.beginPath(); ctx.moveTo(coords.x, coords.y); ctx.lineTo(mapCoords[nextRoom].x, mapCoords[nextRoom].y); ctx.stroke();
            }
        });
    }
    for (const roomKey of state.visitedRooms) {
        const coords = mapCoords[roomKey]; const isCurrent = (roomKey === state.currentRoom);
        ctx.fillStyle = COLORS.BLUE; ctx.fillRect(coords.x - 40, coords.y - 30, 80, 60);
        ctx.strokeStyle = COLORS.WHITE; ctx.lineWidth = 2; ctx.strokeRect(coords.x - 40, coords.y - 30, 80, 60);
        
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        drawText(ctx, rooms[roomKey].name.split(' ')[0], coords.x, coords.y + 16, 14, COLORS.WHITE);
        ctx.textBaseline = 'alphabetic'; 
        
        if (isCurrent) {
            ctx.strokeStyle = COLORS.GREEN; ctx.lineWidth = 6; const exitLen = 45; 
            if (rooms[roomKey].exits['キタ']) drawLine(ctx, coords.x, coords.y - 30, coords.x, coords.y - exitLen, COLORS.GREEN);
            if (rooms[roomKey].exits['ミナミ']) drawLine(ctx, coords.x, coords.y + 30, coords.x, coords.y + exitLen, COLORS.GREEN);
            if (rooms[roomKey].exits['ヒガシ']) drawLine(ctx, coords.x + 40, coords.y, coords.x + exitLen, coords.y, COLORS.GREEN);
            if (rooms[roomKey].exits['ニシ']) drawLine(ctx, coords.x - 40, coords.y, coords.x - exitLen, coords.y, COLORS.GREEN);

            ctx.fillStyle = COLORS.YELLOW; const s = 9; let p1, p2, p3; const ty = coords.y - 8;
            if (state.facing === 'N') { p1=[coords.x, ty - s]; p2=[coords.x - s, ty + s]; p3=[coords.x + s, ty + s]; }
            else if (state.facing === 'S') { p1=[coords.x, ty + s]; p2=[coords.x - s, ty - s]; p3=[coords.x + s, ty - s]; }
            else if (state.facing === 'E') { p1=[coords.x + s, ty]; p2=[coords.x - s, ty - s]; p3=[coords.x - s, ty + s]; }
            else if (state.facing === 'W') { p1=[coords.x - s, ty]; p2=[coords.x + s, ty - s]; p3=[coords.x + s, ty + s]; }
            drawPoly(ctx, [p1, p2, p3], COLORS.YELLOW, COLORS.BLACK);
        }
    }
    drawText(ctx, "モドル ニハ コマンド ヲ カラ ニシテ ［ジッコウ］ ボタン", 320, 390, 14, COLORS.GREEN);
}

function drawCurrentRoom() {
    const canvas = document.getElementById('screen'); const ctx = canvas.getContext('2d');
    if (state.screen === 'title') { drawTitle(ctx); return; }
    if (state.screen === 'map') { drawMap(ctx); return; }
    if (state.screen === 'treasure') { drawTreasure(); return; }
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const room = rooms[state.currentRoom];
    if (room && room.draw) { room.draw(ctx); drawItems(ctx); }

    if (state.screen === 'clear') {
        ctx.fillStyle = COLORS.BLACK; ctx.fillRect(80, 150, 480, 100);
        ctx.strokeStyle = COLORS.CYAN; ctx.strokeRect(80, 150, 480, 100);
        ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
        drawText(ctx, "CONGRATULATIONS!", 320, 200, 30, COLORS.CYAN);
        if (items['ホウセキ'].location === 'inventory') drawText(ctx, "★ PERFECT CLEAR ★", 320, 235, 24, COLORS.YELLOW);
    }
}

function printLog(text, color = COLORS.WHITE) {
    const logDiv = document.getElementById('log-container');
    const p = document.createElement('p'); p.textContent = text; p.style.color = color;
    logDiv.appendChild(p);
    
    // アニメーション等を考慮し複数回スクロール
    scrollLogToBottom();
    setTimeout(scrollLogToBottom, 50);
    setTimeout(scrollLogToBottom, 300);
}

function normalizeInput(str) {
    str = str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
    str = str.replace(/[\u3041-\u3096]/g, match => String.fromCharCode(match.charCodeAt(0) + 0x60));
    return str.trim().toUpperCase();
}

function checkTyping() {
    const input = document.getElementById('cmd-input');
    if (input.value.length > 0) input.classList.add('typing');
    else input.classList.remove('typing');
}

function showHistory() {
    commitToggle();
    if (cmdHistory.length === 0) { printLog("リレキ ガ アリマセン。", COLORS.RED); return; }
    historyIndex++;
    if (historyIndex >= cmdHistory.length) historyIndex = 0;
    const input = document.getElementById('cmd-input');
    input.value = cmdHistory[historyIndex];
    checkTyping();
}

function switchKeyboardMode() {
    commitToggle();
    const input = document.getElementById('cmd-input');
    const btn = document.getElementById('os-kb-btn');
    const kbArea = document.getElementById('keyboard-area');
    const toggleKb = document.getElementById('kb-toggle-container');
    const fullKb = document.getElementById('kb-full-container');
    
    keyboardMode = (keyboardMode + 1) % 3;
    
    if (keyboardMode === 0) {
        isOSEnabled = false;
        input.inputMode = "none";
        btn.style.backgroundColor = '#333'; btn.style.color = '#FFF'; btn.textContent = '📱';
        kbArea.style.display = 'block';
        toggleKb.style.display = 'grid';
        fullKb.style.display = 'none';
        input.blur();
    } else if (keyboardMode === 1) {
        isOSEnabled = true;
        input.inputMode = "text";
        btn.style.backgroundColor = COLORS.GREEN; btn.style.color = '#000'; btn.textContent = '⌨️';
        kbArea.style.display = 'none'; 
        input.focus();
    } else if (keyboardMode === 2) {
        isOSEnabled = false;
        input.inputMode = "none";
        btn.style.backgroundColor = '#333'; btn.style.color = '#FFF'; btn.textContent = '🔠';
        kbArea.style.display = 'block';
        toggleKb.style.display = 'none';
        fullKb.style.display = 'flex';
        input.blur();
    }
    
    setTimeout(scrollLogToBottom, 150);
}

function submitCommand() {
    const input = document.getElementById('cmd-input');
    if (state.screen === 'treasure') { state.screen = 'play'; drawCurrentRoom(); return; }
    processCommand(input.value);
    input.value = ''; input.classList.remove('typing');
}

function getAbsoluteDir(relDir) {
    const dirs = ['N', 'E', 'S', 'W'];
    const idx = dirs.indexOf(state.facing);
    let target = '';
    if (relDir === 'マエ') target = dirs[idx];
    else if (relDir === 'ミギ') target = dirs[(idx + 1) % 4];
    else if (relDir === 'ウシロ') target = dirs[(idx + 2) % 4];
    else if (relDir === 'ヒダリ') target = dirs[(idx + 3) % 4];
    if(target === 'N') return 'キタ'; if(target === 'S') return 'ミナミ';
    if(target === 'E') return 'ヒガシ'; if(target === 'W') return 'ニシ';
    return relDir;
}

function processCommand(cmdStr) {
    commitToggle();
    const normalizedCmd = normalizeInput(cmdStr);
    
    if (state.screen === 'map' && !normalizedCmd) { state.screen = 'play'; drawCurrentRoom(); return; }
    if (!normalizedCmd) return;
    printLog("\n> " + normalizedCmd);
    
    if (state.screen !== 'title' && state.screen !== 'clear') {
        if (cmdHistory[0] !== normalizedCmd) cmdHistory.unshift(normalizedCmd);
    }
    historyIndex = -1; 
    
    if (state.screen === 'title') {
        if (normalizedCmd === 'スタート') {
            state.screen = 'play'; initHiddenItems(); drawCurrentRoom(); 
            printLog("ゲーム スタート！", COLORS.GREEN); 
            printLog("【モクテキ】ヤカタ ニ ネムル「タカラ」オ ミツケダセ。", COLORS.CYAN); 
            printLog("【クリアジョウケン】タカラ オ モッテ ヤカタ ノ マエ ニ モドル。", COLORS.CYAN); 
            printLog("------------------", COLORS.WHITE); look();
        } else if (normalizedCmd === 'ロード') {
            loadGame();
        } else printLog("「スタート」カ「ロード」ト イレテ クダサイ。", COLORS.RED);
        return;
    }
    if (state.screen === 'clear') { 
        if (normalizedCmd === 'ロード') loadGame();
        else printLog("ゲーム ハ クリア ズミ デス。ガメン オ タップ シテ クダサイ。"); 
        return; 
    }

    const parts = normalizedCmd.split(/[\s　]+/);
    let verb = "", noun = "";
    if (parts.length === 1) verb = parts[0];
    else if (parts.length >= 2) {
        if (verbsList.includes(parts[0])) { verb = parts[0]; noun = parts[1]; }
        else if (verbsList.includes(parts[1])) { verb = parts[1]; noun = parts[0]; }
        else { verb = parts[0]; noun = parts[1]; }
    }

    if (state.screen === 'map' && verb !== 'マップ') { state.screen = 'play'; drawCurrentRoom(); }

    switch (verb) {
        case 'キタ': case 'ミナミ': case 'ヒガシ': case 'ニシ': case 'ウエ': case 'シタ':
        case 'マエ': case 'ミギ': case 'ヒダリ': case 'ウシロ': move(verb); break;
        case 'ミル': look(noun); break;
        case 'シラベル': examine(noun); break;
        case 'トル': take(noun); break;
        case 'オトス': drop(noun); break;
        case 'ツカウ': use(noun); break;
        case 'アケル': open(noun); break;
        case 'ヨム': read(noun); break;
        case 'タタク': hit(noun); break;
        case 'ハナシカケル': talk(); break;
        case 'モチモノ': showInventory(); break;
        case 'コマンド': showCommandList(); break;
        case 'マップ': showMap(); break;
        case 'セーブ': saveGame(); break;
        case 'ロード': loadGame(); break;
        default: printLog("ワカラナイ コマンド デス。", COLORS.RED);
    }
}

function lookOrExamineTable(roomName) {
    let tableItems = [];
    if (state.treasureRoom === roomName && !state.flags.chestOpened) tableItems.push("タカラバコ");
    for (const key in items) {
        if (items[key].location === roomName) tableItems.push(items[key].name);
    }
    if (tableItems.length > 0) printLog("テーブル ノ ウエ ニハ " + tableItems.join(' ト ') + " ガ アル。", COLORS.CYAN);
    else printLog("テーブル ノ ウエ ニハ ナニモ ナイ。");
}

        if (state.currentRoom === 'dark_room' && !state.flags.darkRoomLight) { printLog("クラク テ ナニモ ミエナイ。"); return; }

function read(noun) {
    if (noun === 'メモ' && (items['メモ'].location === state.currentRoom || items['メモ'].location === 'inventory')) {
        let hint = "『カギ ハ " + getSpotHint(items['カギ'].location) + " ニ... ";
        hint += "\n タカラ ハ " + getRoomHint(state.treasureRoom) + " ニ...』";
        printLog(hint, COLORS.YELLOW);
    } else printLog("ヨメナイ。");
}

function move(dir) {
    let absDir = dir;
    if (['マエ', 'ミギ', 'ウシロ', 'ヒダリ'].includes(dir)) {
        absDir = getAbsoluteDir(dir);
    }

    const room = rooms[state.currentRoom];
    if (room.exits[absDir]) {
        state.currentRoom = room.exits[absDir];
        state.facing = 'N'; 
        if (!state.visitedRooms.includes(state.currentRoom)) state.visitedRooms.push(state.currentRoom);
        drawCurrentRoom(); look();
        if (state.currentRoom === 'front' && items['タカラ'].location === 'inventory') {
            state.screen = 'clear'; drawCurrentRoom(); printLog("\n★☆★ オメデトウ！ タカラ オ モッテ ダッシュツ シタ！ ★☆★", COLORS.YELLOW);
            printLog("ガメン オ タップ スルト タイトル ニ モドリマス。", COLORS.CYAN);
        }
    } else {
        if (state.currentRoom === 'front' && absDir === 'キタ' && !state.flags.frontDoorOpen) printLog("トビラ ガ シマッテ イル。", COLORS.RED); else printLog("ソッチ ニハ イケナイ。");
    }
}

function take(noun) {
    if (!noun) { printLog("ナニ オ トル？"); return; }
    const item = items[noun];
    if (item) {
        if (item.location === state.currentRoom) {
             if (state.currentRoom === 'dark_room' && !state.flags.darkRoomLight) { printLog("クラク テ ナニモ ミエナイ。"); return; }
             item.location = 'inventory'; printLog(item.name + " オ トッタ。", COLORS.CYAN); 
             if (noun === 'タカラ') state.screen = 'treasure';
             drawCurrentRoom();
        } else if (item.location === 'inventory') printLog("スデニ モッテイル。"); else printLog("ココ ニハ ナイ。");
    } else printLog("ソレ ハ トレナイ。");
}

function drop(noun) {
    const item = items[noun];
    if (item && item.location === 'inventory') { item.location = state.currentRoom; printLog(item.name + " オ オトシタ。"); drawCurrentRoom(); } else printLog("ソレ ハ モッテイナイ。");
}

function use(noun) {
    const item = items[noun];
    if (item && item.location === 'inventory') {
        if (noun === 'マッチ') {
            if (state.currentRoom === 'dark_room' && !state.flags.darkRoomLight) { state.flags.darkRoomLight = true; printLog("マッチ オ スリ、アカリ オ ツケタ。ヘヤ ガ アカルク ナッタ！\nユカ ニ トラップドア ガ アル！", COLORS.YELLOW); drawCurrentRoom(); } else printLog("ココ デ ツカッテモ イミ ガ ナイ。");
        } else if (noun === 'カギ') {
            if (state.currentRoom === state.treasureRoom) {
                if (!state.flags.chestOpened) { state.flags.chestOpened = true; items['タカラ'].location = state.treasureRoom; printLog("カギ ピッタリ ダ！ タカラバコ ガ アイタ！\nナカ カラ タカラ ガ アラワレタ！", COLORS.CYAN); drawCurrentRoom(); } else printLog("タカラバコ ハ モウ アイテイル。");
            } else printLog("ココ デハ ツカエナイ。");
        } else if (noun === 'タカラ' || noun === 'ホウセキ') printLog(item.name + " オ ナガメタ。マブシイ！", COLORS.CYAN);
        else printLog("ツカイカタ ガ ワカラナイ。");
    } else printLog("ソレ ハ モッテイナイ。");
}

function open(noun) {
    if (noun === 'ドア' || noun === 'トビラ') {
        if (state.currentRoom === 'front') {
            if (!state.flags.frontDoorOpen) { state.flags.frontDoorOpen = true; rooms['front'].exits['キタ'] = 'hall'; printLog("トビラ ガ アイタ。"); drawCurrentRoom(); } else printLog("スデニ アイテイル。");
        } else printLog("アケラレナイ。");
    } else if (noun === 'レイゾウコ' && state.currentRoom === 'kitchen') {
        if (!state.flags.fridgeOpen) { state.flags.fridgeOpen = true; printLog("レイゾウコ オ アケタ。ナカ オ シラベタ。"); drawCurrentRoom(); checkHiddenItem('fridge', 'kitchen'); } else printLog("スデニ アイテイル。");
    } else if (noun === 'クローゼット' && state.currentRoom === 'bedroom') {
        printLog("クローゼット オ アケタ。ナカ オ シラベタ。"); checkHiddenItem('closet', 'bedroom');
    } else if (noun === 'ユカ') {
        if (state.currentRoom === 'dark_room' && state.flags.darkRoomLight) {
            if (!state.flags.trapdoorOpen) {
                if (items['バール'].location === 'inventory') { state.flags.trapdoorOpen = true; rooms['dark_room'].exits['シタ'] = 'basement'; printLog("バール デ トラップドア オ コジアケタ！\nシタ ヘ ト ツヅク カイダン ガ アラワレタ。", COLORS.CYAN); drawCurrentRoom(); } else printLog("カタクテ アカナイ。ナニカ コジアケル モノ ガ ヒツヨウ ダ。", COLORS.RED);
            } else printLog("スデニ アイテイル。");
        } else printLog("ココ ニハ ナイ。");
    } else if (noun === 'タカラバコ' && state.currentRoom === state.treasureRoom) {
        if (!state.flags.chestOpened) printLog("カギ ガ カカッテ イテ アカナイ！", COLORS.RED); else printLog("スデニ アイテイル。");
    } else printLog("ソレ ハ アケラレナイ。");
}

function hit(noun) { 
    if (noun === 'カベ') {
        if (state.currentRoom === 'bedroom') {
            if (!state.flags.wallBroken) {
                if (items['ハンマー'].location === 'inventory') { state.flags.wallBroken = true; rooms['bedroom'].exits['キタ'] = 'hidden_room'; printLog("ハンマー デ カベ オ トコトン タタイタ！\nカベ ガ クズレ、キタ ニ ヌケアナ ガ デキタ！", COLORS.CYAN); drawCurrentRoom(); } else printLog("スデ デハ コワセソウ ニ ナイ。", COLORS.RED);

    } else printLog(noun ? noun + " オ タタイタ。イタイ！" : "クウカン オ タタイタ。ムナシイ。"); 
}

    'メイシ': [{text: 'ヘヤ', action: () => insertText('ヘヤ'), type: 'noun'},{text: 'ドア', action: () => insertText('ドア'), type: 'noun'},{text: 'カギ', action: () => insertText('カギ'), type: 'noun'},{text: 'メモ', action: () => insertText('メモ'), type: 'noun'},{text: 'マッチ', action: () => insertText('マッチ'), type: 'noun'},{text: 'ハンマー', action: () => insertText('ハンマー'), type: 'noun'},{text: 'バール', action: () => insertText('バール'), type: 'noun'},{text: 'タカラ', action: () => insertText('タカラ'), type: 'noun'},{text: 'ホウセキ', action: () => insertText('ホウセキ'), type: 'noun'},{text: 'カベ', action: () => insertText('カベ'), type: 'noun'},{text: 'ユカ', action: () => insertText('ユカ'), type: 'noun'},{text: 'レイゾウコ', action: () => insertText('レイゾウコ'), type: 'noun'},{text: 'タカラバコ', action: () => insertText('タカラバコ'), type: 'noun'},{text: 'テーブル', action: () => insertText('テーブル'), type: 'noun'},{text: 'ホンダナ', action: () => insertText('ホンダナ'), type: 'noun'},{text: 'オモチャ', action: () => insertText('オモチャ'), type: 'noun'},{text: 'ベッド', action: () => insertText('ベッド'), type: 'noun'},{text: 'クローゼット', action: () => insertText('クローゼット'), type: 'noun'},{text: 'マド', action: () => insertText('マド'), type: 'noun'},{text: 'カイダン', action: () => insertText('カイダン'), type: 'noun'}],

function showCmdCategory(catName) {
    document.querySelectorAll('.cmd-cat-btn').forEach(btn => btn.classList.toggle('active', btn.id === `cat-${catName}`));
    const container = document.getElementById('cmd-items'); container.innerHTML = '';
    cmdData[catName].forEach(item => { const btn = document.createElement('button'); btn.className = `item-btn ${item.type}`; btn.textContent = item.text; btn.onclick = item.action; container.appendChild(btn); });
}

// --- ガラケー風仮想キーボード（トグル入力） ---
const kbData = { 'ア': ['ア','イ','ウ','エ','オ'], 'カ': ['カ','キ','ク','ケ','コ'], 'サ': ['サ','シ','ス','セ','ソ'], 'タ': ['タ','チ','ツ','テ','ト'], 'ナ': ['ナ','ニ','ヌ','ネ','ノ'], 'ハ': ['ハ','ヒ','フ','ヘ','ホ'], 'マ': ['マ','ミ','ム','メ','モ'], 'ヤ': ['ヤ','ユ','ヨ'], 'ラ': ['ラ','リ','ル','レ','ロ'], 'ワ': ['ワ','ヲ','ン'] };
let toggleState = { active: false, cat: '', index: 0 };
function commitToggle() { toggleState.active = false; }

function handleKbToggle(event, cat) {
    event.preventDefault(); event.stopPropagation(); const input = document.getElementById('cmd-input');
    if (toggleState.active && toggleState.cat === cat) {
        toggleState.index = (toggleState.index + 1) % kbData[cat].length;
        input.value = input.value.slice(0, -1) + kbData[cat][toggleState.index];
    } else {
        commitToggle(); toggleState.active = true; toggleState.cat = cat; toggleState.index = 0; input.value += kbData[cat][0];
    }
    checkTyping();
}

function typeSpecial(char) {
    commitToggle(); const input = document.getElementById('cmd-input');
    if (char === 'BS') input.value = input.value.slice(0, -1);
    else if (char === '゛') { const map={'カ':'ガ','キ':'ギ','ク':'グ','ケ':'ゲ','コ':'ゴ','サ':'ザ','シ':'ジ','ス':'ズ','セ':'ゼ','ソ':'ゾ','タ':'ダ','チ':'ヂ','ツ':'ヅ','テ':'デ','ト':'ド','ハ':'バ','ヒ':'ビ','フ':'ブ','ヘ':'ベ','ホ':'ボ'}; if(map[input.value.slice(-1)]) input.value = input.value.slice(0, -1) + map[input.value.slice(-1)]; }
    else if (char === '゜') { const map={'ハ':'パ','ヒ':'ピ','フ':'プ','ヘ':'ペ','ホ':'ポ'}; if(map[input.value.slice(-1)]) input.value = input.value.slice(0, -1) + map[input.value.slice(-1)]; }
    else if (char === '小') { const smap={'ア':'ァ','イ':'ィ','ウ':'ゥ','エ':'ェ','オ':'ォ','ヤ':'ャ','ユ':'ュ','ヨ':'ョ','ツ':'ッ'}; const rmap={'ァ':'ア','ィ':'イ','ゥ':'ウ','ェ':'エ','ォ':'オ','ャ':'ヤ','ュ':'ユ','ョ':'ヨ','ッ':'ツ'}; if(smap[input.value.slice(-1)]) input.value = input.value.slice(0, -1) + smap[input.value.slice(-1)]; else if(rmap[input.value.slice(-1)]) input.value = input.value.slice(0, -1) + rmap[input.value.slice(-1)]; }
    else if (char === '空') input.value += ' '; else input.value += char;
    checkTyping();
}

let bsInterval = null; let bsTimeout = null;
const startBS = (e) => { e.preventDefault(); typeSpecial('BS'); bsTimeout = setTimeout(() => { bsInterval = setInterval(() => { typeSpecial('BS'); }, 80); }, 300); };
const stopBS = (e) => { e.preventDefault(); clearTimeout(bsTimeout); clearInterval(bsInterval); };

// 長押しBSイベントの登録
const bsBtns = [document.getElementById('bs-btn'), document.getElementById('bs-btn-top')];
bsBtns.forEach(btn => {
    if (btn) {
        btn.addEventListener('mousedown', startBS);
        btn.addEventListener('touchstart', startBS, {passive: false});
        ['mouseup', 'mouseleave', 'touchend', 'touchcancel'].forEach(ev => btn.addEventListener(ev, stopBS));
    }
});

document.addEventListener('click', (e) => { if (!e.target.classList.contains('kb-toggle-btn')) commitToggle(); });

function initFullKeyboard() {
    const kbCols = [
        ['ア','イ','ウ','エ','オ'], ['カ','キ','ク','ケ','コ'], ['サ','シ','ス','セ','ソ'],
        ['タ','チ','ツ','テ','ト'], ['ナ','ニ','ヌ','ネ','ノ'], ['ハ','ヒ','フ','ヘ','ホ'],
        ['マ','ミ','ム','メ','モ'], ['ヤ','','ユ','','ヨ'], ['ラ','リ','ル','レ','ロ'],
        ['ワ','ヲ','ン','','']
    ];
    const container = document.getElementById('kb-full-container');
    kbCols.forEach(colChars => {
        const colDiv = document.createElement('div');
        colDiv.className = 'kb-col';
        colChars.forEach(char => {
            const btn = document.createElement('button');
            btn.className = 'kb-full-btn';
            if (char === '') {
                btn.style.visibility = 'hidden';
            } else {
                btn.textContent = char;
                btn.onclick = () => typeSpecial(char);
            }
            colDiv.appendChild(btn);
        });
        container.appendChild(colDiv);
    });
}

window.onload = () => {
    initFullKeyboard();
    showCmdCategory('イドウ'); 
    drawCurrentRoom(); 
    printLog("「スタート」カ「ロード」ト イレテ クダサイ。", COLORS.GREEN);
};
