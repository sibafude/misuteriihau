<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ミステリーハウス レトロADV</title>
<style>
    :root {
        --c-bg: #000000;
        --c-white: #FFFFFF;
        --c-green: #00FF00;
        --c-cyan: #00FFFF;
    }
    html, body {
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        position: fixed;
        background-color: #111;
        font-family: 'Courier New', Courier, monospace, sans-serif;
    }
    #game-container {
        max-width: 640px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        height: 100%;
        border-left: 1px solid #333;
        border-right: 1px solid #333;
        box-sizing: border-box;
        background-color: var(--c-bg);
    }
    /* 絵の画面 */
    canvas {
        width: 100%;
        height: auto;
        /* OSキーボードが出ても適度に縮むように flex-shrink を有効化 */
        max-height: 38vh; 
        object-fit: contain;
        background-color: var(--c-bg);
        border-bottom: 2px solid var(--c-white);
        image-rendering: pixelated;
        flex: 0 1 auto;
    }
    /* メッセージ領域 */
    #log-container {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 6px 8px;
        font-size: 13px;
        line-height: 1.5;
        color: var(--c-white);
        white-space: pre-wrap;
    }
    #log-container p { margin: 0 0 6px 0; }
    
    /* コントロール全体 */
    #controls {
        flex: 0 0 auto;
        padding: 4px;
        background: #111;
        border-top: 1px solid #555;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    /* 横スクロール領域 */
    .scroll-row {
        display: flex; overflow-x: auto; gap: 6px; padding: 2px 0;
        scrollbar-width: none; 
    }
    .scroll-row::-webkit-scrollbar { display: none; }
    
    /* タブ・ボタン共通 */
    .cat-btn {
        flex: 0 0 auto; min-width: 45px; padding: 6px 0; background-color: #222; color: #aaa;
        border: 1px solid #444; border-radius: 4px; font-size: 13px; font-weight: bold;
        text-align: center; cursor: pointer; touch-action: manipulation;
        transition: transform 0.1s;
    }
    .cat-btn:active { transform: scale(0.92); }
    .cat-btn.active { background-color: #555; color: #fff; border-color: #777; }
    
    .item-btn {
        flex: 0 0 auto; padding: 6px 12px; background-color: #000;
        border: 1px solid #555; border-radius: 4px; font-size: 14px;
        font-weight: bold; white-space: nowrap; cursor: pointer; touch-action: manipulation;
    }
    .item-btn:active { transform: scale(0.92); background-color: #333; }
    .item-btn.verb { border-color: var(--c-green); color: var(--c-green); }
    .item-btn.noun { border-color: var(--c-cyan); color: var(--c-cyan); }
    .item-btn.other { border-color: var(--c-white); color: var(--c-white); }
    .item-btn.kb-char { padding: 6px 16px; border-color: #888; color: #fff; } 
    
    /* 入力フォーム */
    #cmd-form { display: flex; gap: 4px; }
    #cmd-input {
        flex: 1; background-color: #000; color: #FFF; border: 1px solid var(--c-white);
        padding: 6px 8px; font-family: inherit; font-size: 16px; border-radius: 4px;
        caret-color: transparent;
    }
    #cmd-input.typing { caret-color: #FFF; }
    #cmd-input:focus { outline: none; box-shadow: 0 0 5px var(--c-white); }
    
    .action-btn {
        background-color: #333; color: #FFF; border: 1px solid #555; border-radius: 4px; 
        padding: 0 8px; font-weight: bold; font-size: 13px; cursor: pointer;
        touch-action: manipulation; transition: transform 0.1s;
    }
    .action-btn:active { transform: scale(0.92); background-color: #555; }
    .cmd-submit { background-color: var(--c-white); color: #000; border-color: var(--c-white); padding: 0 12px; }
    
    /* 常時表示の特殊キー */
    .special-keys { display: flex; gap: 4px; }
    .special-btn {
        flex: 1; padding: 5px 0; background-color: #2a2a2a; color: #fff;
        border: 1px solid #555; border-radius: 4px; font-size: 13px; font-weight: bold;
        text-align: center; cursor: pointer; touch-action: manipulation;
    }
    .special-btn:active { background-color: #555; transform: scale(0.95); }
</style>
</head>
<body>

<div id="game-container">
    <canvas id="screen" width="640" height="400"></canvas>
    <div id="log-container"></div>
    <div id="controls">
        
        <!-- コマンドカテゴリタブ -->
        <div class="scroll-row" id="cmd-tabs">
            <button class="cat-btn cmd-cat-btn" id="cat-イドウ" onclick="showCmdCategory('イドウ')" style="flex:1;">イドウ</button>
            <button class="cat-btn cmd-cat-btn" id="cat-ドウシ" onclick="showCmdCategory('ドウシ')" style="flex:1;">ドウシ</button>
            <button class="cat-btn cmd-cat-btn" id="cat-メイシ" onclick="showCmdCategory('メイシ')" style="flex:1;">メイシ</button>
            <button class="cat-btn cmd-cat-btn" id="cat-ソノタ" onclick="showCmdCategory('ソノタ')" style="flex:1;">ソノタ</button>
        </div>
        
        <!-- コマンドのアイテム -->
        <div id="cmd-items" class="scroll-row"></div>
        
        <!-- 入力フォーム -->
        <form id="cmd-form">
            <button type="button" class="action-btn" onclick="showHistory()">履歴</button>
            <input type="text" id="cmd-input" placeholder="コマンド入力" inputmode="none" autocomplete="off" oninput="checkTyping()">
            <button type="button" class="action-btn" id="os-kb-btn" onclick="toggleOSKeyboard()" title="OSキーボード切替">⌨️</button>
            <button type="submit" class="action-btn cmd-submit">実行</button>
        </form>

        <!-- 特殊キー（常時表示） -->
        <div class="special-keys">
            <button class="special-btn" onclick="typeChar('゛')">゛(濁点)</button>
            <button class="special-btn" onclick="typeChar('゜')">゜(半濁)</button>
            <button class="special-btn" onclick="typeChar('小')">小文字</button>
            <button class="special-btn" onclick="typeChar('ー')">ー</button>
            <button class="special-btn" onclick="typeChar('空')">空白</button>
            <button class="special-btn" onclick="typeChar('BS')">BS</button>
        </div>

        <!-- キーボードのアイテム（アイウエオなど） -->
        <div id="kb-items" class="scroll-row" style="justify-content: center; min-height: 32px;"></div>

        <!-- キーボードカテゴリタブ（ア〜ワ） -->
        <div class="scroll-row" id="kb-tabs">
            <!-- JSで動的に生成 -->
        </div>

    </div>
</div>

<script>
// --- iOSキーボードスクロール対策 ---
if (window.visualViewport) {
    const adjustHeight = () => {
        document.body.style.height = window.visualViewport.height + 'px';
        window.scrollTo(0, 0);
    };
    window.visualViewport.addEventListener('resize', adjustHeight);
    adjustHeight();
}

// --- カラー定義 ---
const COLORS = {
    BLACK: '#000000', WHITE: '#FFFFFF', RED: '#FF0000', CYAN: '#00FFFF',
    BLUE: '#0000FF', YELLOW: '#FFFF00', GREEN: '#00FF00', MAGENTA: '#FF00FF'
};

// --- ゲーム状態 ---
let state = {
    screen: 'title', // 'title', 'play', 'clear', 'map'
    currentRoom: 'front',
    facing: 'N',
    visitedRooms: ['front'],
    flags: { frontDoorOpen: false, fridgeOpen: false, chestOpened: false }
};

const items = {
    'メモ': { name: 'メモ', location: 'hall' },
    'カギ': { name: 'カギ', location: 'hidden' },
    'マッチ': { name: 'マッチ', location: 'hidden' },
    'タカラ': { name: 'タカラ', location: 'hidden' }
};

// ランダムにアイテムを配置する関数
function initHiddenItems() {
    // 隠し場所の候補
    const hiddenSpots = ['fridge', 'study_books', 'kids_toy', 'bed'];
    // 配列をシャッフル
    for (let i = hiddenSpots.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [hiddenSpots[i], hiddenSpots[j]] = [hiddenSpots[j], hiddenSpots[i]];
    }
    // カギとマッチに割り当て
    items['カギ'].location = hiddenSpots[0];
    items['マッチ'].location = hiddenSpots[1];
}

// 隠しアイテムを発見したかの汎用チェック
function checkHiddenItem(spot, roomName) {
    let found = [];
    for (const key in items) {
        if (items[key].location === spot) {
            items[key].location = roomName; // 部屋にアイテムが出現
            found.push(items[key].name);
        }
    }
    if (found.length > 0) {
        printLog("ナカ カラ " + found.join(' ト ') + " ガ デテキタ！", COLORS.CYAN);
        drawCurrentRoom();
    } else {
        printLog("ナカ ニハ トクニ メボシイ モノ ハ ナイ。");
    }
}

let cmdHistory = [];
let historyIndex = -1;
let isOSEnabled = false;

// --- 描画系ユーティリティ ---
function drawPoly(ctx, points, fillColor, strokeColor = COLORS.WHITE) {
    if (points.length < 2) return;
    ctx.beginPath(); ctx.moveTo(points[0][0], points[0][1]);
    for(let i=1; i<points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
    ctx.closePath();
    if(fillColor) { ctx.fillStyle = fillColor; ctx.fill(); }
    if(strokeColor) { ctx.strokeStyle = strokeColor; ctx.lineWidth = 2; ctx.stroke(); }
}
function drawLine(ctx, x1, y1, x2, y2, color = COLORS.WHITE) {
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
}
function drawText(ctx, text, x, y, size, color, outline = false) {
    ctx.font = `bold ${size}px monospace`;
    if (outline) { ctx.strokeStyle = COLORS.BLACK; ctx.lineWidth = 3; ctx.strokeText(text, x, y); }
    ctx.fillStyle = color; ctx.fillText(text, x, y);
}

// マップ用コンパス（通常の絵の画面からは削除）
function drawCompass(ctx) {
    const cx = 590, cy = 40;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; ctx.fillRect(cx - 35, cy - 35, 70, 70);
    const dirs = ['N', 'E', 'S', 'W'];
    let topIndex = dirs.indexOf(state.facing);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    drawText(ctx, dirs[topIndex], cx, cy - 20, 18, COLORS.YELLOW, true);
    drawText(ctx, dirs[(topIndex + 3) % 4], cx - 20, cy, 18, COLORS.WHITE, true);
    drawText(ctx, "+", cx, cy, 18, COLORS.WHITE, true);
    drawText(ctx, dirs[(topIndex + 1) % 4], cx + 20, cy, 18, COLORS.WHITE, true);
    drawText(ctx, dirs[(topIndex + 2) % 4], cx, cy + 20, 18, COLORS.WHITE, true);
    ctx.textBaseline = 'alphabetic';
}

function drawTitle(ctx) {
    ctx.clearRect(0, 0, 640, 400); ctx.textAlign = 'left';
    drawText(ctx, "MYSTERY", 30, 80, 70, COLORS.BLUE);
    ctx.lineWidth = 1; ctx.strokeStyle = COLORS.RED; ctx.strokeText("MYSTERY", 30, 80);
    drawText(ctx, "HOUSE", 80, 160, 70, COLORS.BLUE);
    ctx.strokeStyle = COLORS.RED; ctx.strokeText("HOUSE", 80, 160);

    drawPoly(ctx, [[400, 240], [580, 280], [580, 390], [400, 390]], COLORS.BLUE, COLORS.WHITE);
    drawPoly(ctx, [[280, 300], [400, 240], [400, 390], [280, 390]], COLORS.CYAN, COLORS.WHITE);
    drawPoly(ctx, [[370, 150], [550, 220], [580, 280], [400, 240]], COLORS.RED, COLORS.WHITE);
    drawPoly(ctx, [[370, 150], [400, 240], [280, 300]], COLORS.CYAN, COLORS.WHITE);
    drawPoly(ctx, [[450, 300], [490, 310], [490, 350], [450, 340]], COLORS.BLACK, COLORS.WHITE);
    drawPoly(ctx, [[510, 260], [540, 270], [540, 290], [510, 280]], COLORS.BLACK, COLORS.WHITE);
    drawPoly(ctx, [[330, 250], [360, 230], [360, 250], [330, 270]], COLORS.BLACK, COLORS.WHITE);
}

function drawMap(ctx) {
    ctx.fillStyle = COLORS.BLACK; ctx.fillRect(0, 0, 640, 400);
    ctx.textAlign = 'center'; drawText(ctx, "--- MAP ---", 320, 40, 24, COLORS.CYAN); 
    drawCompass(ctx); // マップにはコンパスを描画
    
    // 2階は右上に描画して重なりを防ぐ
    const mapCoords = {
        'front': { x: 320, y: 320 }, 'hall': { x: 320, y: 220 }, 'kitchen': { x: 180, y: 220 },
        'dark_room': { x: 460, y: 220 }, 'study': { x: 320, y: 120 },
        'corridor_2f': { x: 480, y: 120 }, 'kids_room': { x: 480, y: 40 }, 'bedroom': { x: 580, y: 120 }
    };

    ctx.strokeStyle = COLORS.WHITE; ctx.lineWidth = 4;
    // 線引き
    for (const roomKey of state.visitedRooms) {
        const coords = mapCoords[roomKey]; const room = rooms[roomKey];
        ['キタ', 'ミナミ', 'ヒガシ', 'ニシ'].forEach(dir => {
            const nextRoom = room.exits[dir];
            if (nextRoom && state.visitedRooms.includes(nextRoom)) {
                ctx.beginPath(); ctx.moveTo(coords.x, coords.y); ctx.lineTo(mapCoords[nextRoom].x, mapCoords[nextRoom].y); ctx.stroke();
            }
        });
    }
    // 部屋描画
    for (const roomKey of state.visitedRooms) {
        const coords = mapCoords[roomKey]; const isCurrent = (roomKey === state.currentRoom);
        ctx.fillStyle = COLORS.BLUE; ctx.fillRect(coords.x - 40, coords.y - 30, 80, 60);
        ctx.strokeStyle = COLORS.WHITE; ctx.lineWidth = 2; ctx.strokeRect(coords.x - 40, coords.y - 30, 80, 60);
        
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        drawText(ctx, rooms[roomKey].name.split(' ')[0], coords.x, coords.y + 16, 14, COLORS.WHITE);
        ctx.textBaseline = 'alphabetic'; 
        
        if (isCurrent) {
            ctx.strokeStyle = COLORS.GREEN; ctx.lineWidth = 6; const exitLen = 45; 
            if (rooms[roomKey].exits['キタ']) drawLine(ctx, coords.x, coords.y - 30, coords.x, coords.y - exitLen, COLORS.GREEN);
            if (rooms[roomKey].exits['ミナミ']) drawLine(ctx, coords.x, coords.y + 30, coords.x, coords.y + exitLen, COLORS.GREEN);
            if (rooms[roomKey].exits['ヒガシ']) drawLine(ctx, coords.x + 40, coords.y, coords.x + exitLen, coords.y, COLORS.GREEN);
            if (rooms[roomKey].exits['ニシ']) drawLine(ctx, coords.x - 40, coords.y, coords.x - exitLen, coords.y, COLORS.GREEN);

            ctx.fillStyle = COLORS.YELLOW; const s = 9; let p1, p2, p3; const ty = coords.y - 8;
            if (state.facing === 'N') { p1=[coords.x, ty - s]; p2=[coords.x - s, ty + s]; p3=[coords.x + s, ty + s]; }
            else if (state.facing === 'S') { p1=[coords.x, ty + s]; p2=[coords.x - s, ty - s]; p3=[coords.x + s, ty - s]; }
            else if (state.facing === 'E') { p1=[coords.x + s, ty]; p2=[coords.x - s, ty - s]; p3=[coords.x - s, ty + s]; }
            else if (state.facing === 'W') { p1=[coords.x - s, ty]; p2=[coords.x + s, ty - s]; p3=[coords.x + s, ty + s]; }
            drawPoly(ctx, [p1, p2, p3], COLORS.YELLOW, COLORS.BLACK);
        }
    }
    drawText(ctx, "モドル ニハ ［ジッコウ］ ボタン", 320, 380, 16, COLORS.GREEN);
}

// --- 部屋データ ---
const rooms = {
    'front': {
        name: 'ヤカタ ノ マエ', desc: 'アナタ ハ フルイ ヤカタ ノ マエ ニ イル。キタ ニ トビラ ガ アル。',
        examine: () => printLog("キ ノ トビラ ダ。"), exits: {},
        draw: (ctx) => {
            drawPoly(ctx, [[0,0], [640,0], [640,300], [0,300]], COLORS.BLACK, null);
            drawPoly(ctx, [[0,300], [640,300], [640,400], [0,400]], COLORS.GREEN, null);
            drawPoly(ctx, [[150, 150], [490, 150], [490, 300], [150, 300]], COLORS.BLUE, COLORS.WHITE);
            drawPoly(ctx, [[320, 50], [490, 150], [150, 150]], COLORS.RED, COLORS.WHITE);
            if (state.flags.frontDoorOpen) {
                drawPoly(ctx, [[280, 180], [360, 180], [360, 300], [280, 300]], COLORS.BLACK, null);
                drawPoly(ctx, [[280, 180], [240, 120], [240, 240], [280, 300]], COLORS.GREEN, COLORS.WHITE);
            } else {
                drawPoly(ctx, [[280, 180], [360, 180], [360, 300], [280, 300]], COLORS.GREEN, COLORS.WHITE);
                drawPoly(ctx, [[340, 240], [345, 240], [345, 245], [340, 245]], COLORS.WHITE, null);
            }
        }
    },
    'hall': {
        name: 'ゲンカン ホール', desc: 'ヒロイ ホール ダ。キタ、ニシ、ヒガシ ニ トビラ ガ アル。ミナミ ハ デグチ ダ。',
        examine: () => printLog("トクニ カワッタ トコロ ハ ナイ。"),
        exits: { 'ミナミ': 'front', 'ニシ': 'kitchen', 'ヒガシ': 'dark_room', 'キタ': 'study', 'ウエ': 'corridor_2f' },
        draw: (ctx) => {
            drawPoly(ctx, [[0,0], [640,0], [480, 60], [160, 60]], COLORS.YELLOW, COLORS.WHITE);
            drawPoly(ctx, [[0,400], [640,400], [480, 260], [160, 260]], COLORS.RED, COLORS.WHITE);
            drawPoly(ctx, [[0,0], [160, 60], [160, 260], [0, 400]], COLORS.BLUE, COLORS.WHITE);
            drawPoly(ctx, [[640,0], [480, 60], [480, 260], [640, 400]], COLORS.BLUE, COLORS.WHITE);
            drawPoly(ctx, [[160,60], [480, 60], [480, 260], [160, 260]], COLORS.CYAN, COLORS.WHITE);
            drawPoly(ctx, [[0, 120], [80, 140], [80, 280], [0, 320]], COLORS.BLACK, COLORS.WHITE); // 西
            drawPoly(ctx, [[640, 120], [560, 140], [560, 280], [640, 320]], COLORS.BLACK, COLORS.WHITE); // 東
            drawPoly(ctx, [[260, 140], [340, 140], [340, 260], [260, 260]], COLORS.BLACK, COLORS.WHITE); // 北（書斎）
            // 階段（上へ）
            drawPoly(ctx, [[400, 140], [480, 140], [480, 260], [400, 260]], COLORS.BLACK, COLORS.WHITE);
            drawLine(ctx, 400, 240, 420, 240); drawLine(ctx, 420, 240, 420, 220); drawLine(ctx, 420, 220, 440, 220); drawLine(ctx, 440, 220, 440, 200); drawLine(ctx, 440, 200, 460, 200); drawLine(ctx, 460, 200, 460, 180); drawLine(ctx, 460, 180, 480, 180);
        }
    },
    'kitchen': {
        name: 'ダイドコロ', desc: 'ダイドコロ ダ。ヒガシ ニ ホール ヘノ トビラ ガ アル。レイゾウコ ト テーブル ガ アル。',
        examine: () => printLog("シラベル モノ オ シテイ シテ クダサイ。"),
        exits: { 'ヒガシ': 'hall' },
        draw: (ctx) => {
            drawPoly(ctx, [[0,0], [640,0], [640,250], [0,250]], COLORS.YELLOW, null);
            drawPoly(ctx, [[0,250], [640,250], [640,400], [0,400]], COLORS.CYAN, null);
            // テーブル
            drawPoly(ctx, [[100, 250], [300, 250], [340, 320], [60, 320]], COLORS.MAGENTA, COLORS.WHITE); 
            drawPoly(ctx, [[120, 320], [140, 320], [140, 380], [120, 380]], COLORS.WHITE, COLORS.BLACK);
            drawPoly(ctx, [[260, 320], [280, 320], [280, 380], [260, 380]], COLORS.WHITE, COLORS.BLACK);
            // 冷蔵庫
            if (state.flags.fridgeOpen) {
                drawPoly(ctx, [[450, 80], [550, 80], [550, 280], [450, 280]], COLORS.WHITE, COLORS.BLACK); 
                ctx.fillStyle = COLORS.BLACK; ctx.fillRect(460, 90, 80, 180); // 開いた庫内
                drawPoly(ctx, [[550, 80], [600, 120], [600, 320], [550, 280]], COLORS.WHITE, COLORS.BLACK); // 扉
            } else {
                drawPoly(ctx, [[450, 80], [550, 80], [550, 280], [450, 280]], COLORS.WHITE, COLORS.BLACK); 
                drawLine(ctx, 450, 180, 550, 180, COLORS.BLACK);
            }
        }
    },
    'dark_room': {
        name: 'クライ ヘヤ', desc: () => state.flags.darkRoomLight ? 'アカルク ナッタ。タカラバコ ガ アル。ニシ ニ トビラ ガ アル。' : 'クラク テ ナニモ ミエナイ。ニシ ニ トビラ ガ アル。',
        examine: () => printLog("シラベル モノ オ シテイ シテ クダサイ。"),
        exits: { 'ニシ': 'hall' },
        draw: (ctx) => {
            if (state.flags.darkRoomLight) {
                drawPoly(ctx, [[0,0], [640,0], [640,300], [0,300]], COLORS.MAGENTA, null);
                drawPoly(ctx, [[0,300], [640,300], [640,400], [0,400]], COLORS.YELLOW, null);
                drawPoly(ctx, [[250, 250], [390, 250], [390, 300], [250, 300]], COLORS.RED, COLORS.WHITE);
                drawPoly(ctx, [[250, 250], [270, 230], [410, 230], [390, 250]], COLORS.RED, COLORS.WHITE);
                drawPoly(ctx, [[390, 250], [410, 230], [410, 280], [390, 300]], COLORS.RED, COLORS.WHITE);
                if (state.flags.chestOpened) drawPoly(ctx, [[250, 250], [230, 190], [370, 190], [390, 250]], COLORS.RED, COLORS.WHITE);
                else drawPoly(ctx, [[315, 260], [325, 260], [325, 270], [315, 270]], COLORS.BLACK, null);
            } else {
                ctx.fillStyle = COLORS.BLACK; ctx.fillRect(0,0,640,400);
                ctx.strokeStyle = COLORS.RED; ctx.beginPath(); ctx.arc(300, 200, 5, 0, Math.PI*2); ctx.arc(340, 200, 5, 0, Math.PI*2); ctx.stroke();
            }
        }
    },
    'study': {
        name: 'ショサイ', desc: 'ホン ガ タクサン アル ショサイ ダ。ミナミ ニ トビラ ガ アル。',
        examine: () => printLog("シラベル モノ オ シテイ シテ クダサイ。"),
        exits: { 'ミナミ': 'hall' },
        draw: (ctx) => {
            drawPoly(ctx, [[0,0], [640,0], [640,400], [0,400]], COLORS.GREEN, null);
            drawPoly(ctx, [[100,100], [540,100], [540,300], [100,300]], COLORS.BLACK, COLORS.WHITE); // 奥壁
            // 本棚
            drawPoly(ctx, [[150, 120], [300, 120], [300, 300], [150, 300]], COLORS.YELLOW, COLORS.BLACK);

function printLog(text, color = COLORS.WHITE) {
    const logDiv = document.getElementById('log-container');
    const p = document.createElement('p'); p.textContent = text; p.style.color = color;
    logDiv.appendChild(p);
    setTimeout(() => { logDiv.scrollTop = logDiv.scrollHeight; }, 10);
}

function normalizeInput(str) {
    str = str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
    str = str.replace(/[\u3041-\u3096]/g, match => String.fromCharCode(match.charCodeAt(0) + 0x60));
    return str.trim().toUpperCase();
}

function checkTyping() {
    const input = document.getElementById('cmd-input');
    if (input.value.length > 0) input.classList.add('typing');
    else input.classList.remove('typing');
}

function showHistory() {
    if (cmdHistory.length === 0) { printLog("リレキ ガ アリマセン。", COLORS.RED); return; }
    historyIndex++;
    if (historyIndex >= cmdHistory.length) historyIndex = 0;
    const input = document.getElementById('cmd-input');
    input.value = cmdHistory[historyIndex];
    checkTyping();
}

function toggleOSKeyboard() {
    const input = document.getElementById('cmd-input');
    const btn = document.getElementById('os-kb-btn');
    isOSEnabled = !isOSEnabled;
    if (isOSEnabled) {
        input.inputMode = "text";
        btn.style.backgroundColor = COLORS.GREEN; btn.style.color = '#000';
        input.focus();
    } else {
        input.inputMode = "none";
        btn.style.backgroundColor = '#333'; btn.style.color = '#FFF';
        input.blur();
    }
}

const verbsList = ['キタ', 'ミナミ', 'ヒガシ', 'ニシ', 'ウエ', 'シタ', 'ミル', 'シラベル', 'トル', 'オトス', 'ツカウ', 'アケル', 'タタク', 'ハナシカケル', 'ヨム', 'モチモノ', 'コマンドリスト', 'スタート', 'マップ'];

function processCommand(cmdStr) {
    const normalizedCmd = normalizeInput(cmdStr);
    
    if (state.screen === 'map' && !normalizedCmd) { state.screen = 'play'; drawCurrentRoom(); return; }
    if (!normalizedCmd) return;
    printLog("\n> " + normalizedCmd);
    
    if (state.screen !== 'title' && state.screen !== 'clear') {
        if (cmdHistory[0] !== normalizedCmd) cmdHistory.unshift(normalizedCmd);
    }
    historyIndex = -1; 
    
    if (state.screen === 'title') {
        if (normalizedCmd === 'スタート') {
            state.screen = 'play'; 
            initHiddenItems(); // アイテムをランダム配置
            drawCurrentRoom(); 
            printLog("ゲーム スタート！", COLORS.GREEN); 
            printLog("【モクテキ】ヤカタ ニ ネムル「タカラ」オ ミツケダセ。", COLORS.CYAN); 
            printLog("【クリアジョウケン】タカラ オ モッテ ヤカタ ノ マエ ニ モドル。", COLORS.CYAN); 
            printLog("------------------", COLORS.WHITE); 
            look();
        } else printLog("「スタート」ト イレテ クダサイ。", COLORS.RED);
        return;
    }
    if (state.screen === 'clear') { printLog("ゲーム ハ クリア ズミ デス。"); return; }

    const parts = normalizedCmd.split(/[\s　]+/);
    let verb = "", noun = "";
    if (parts.length === 1) verb = parts[0];
    else if (parts.length >= 2) {
        if (verbsList.includes(parts[0])) { verb = parts[0]; noun = parts[1]; }
        else if (verbsList.includes(parts[1])) { verb = parts[1]; noun = parts[0]; }
        else { verb = parts[0]; noun = parts[1]; }
    }

    if (state.screen === 'map' && verb !== 'マップ') { state.screen = 'play'; drawCurrentRoom(); }

    switch (verb) {
        case 'キタ': case 'ミナミ': case 'ヒガシ': case 'ニシ': case 'ウエ': case 'シタ': move(verb); break;
        case 'ミル': look(); break;
        case 'シラベル': examine(noun); break;
        case 'トル': take(noun); break;
        case 'オトス': drop(noun); break;
        case 'ツカウ': use(noun); break;
        case 'アケル': open(noun); break;
        case 'ヨム': read(noun); break;
        case 'タタク': hit(noun); break;
        case 'ハナシカケル': talk(); break;
        case 'モチモノ': showInventory(); break;
        case 'コマンドリスト': showCommandList(); break;
        case 'マップ': showMap(); break;
        default: printLog("ワカラナイ コマンド デス。", COLORS.RED);
    }
}

function look() {

function examine(noun) {
    if (state.currentRoom === 'dark_room' && !state.flags.darkRoomLight) { printLog("クラク テ ナニモ ミエナイ。"); return; }
    if (noun) {
        if (noun === 'ドア' || noun === 'トビラ') {
            if (state.currentRoom === 'front') printLog(state.flags.frontDoorOpen ? "トビラ ハ アイテイル。" : "キ ノ トビラ ダ。カギ ハ カカッテ イナイ ヨウダ。"); else printLog("フツウ ノ ドア ダ。");
        } else if (noun === 'レイゾウコ') {
            if (state.currentRoom === 'kitchen') printLog(state.flags.fridgeOpen ? "レイゾウコ ハ アイテイル。" : "シロイ レイゾウコ ダ。アケテミヨウ。"); else printLog("ココ ニハ ナイ。");
        } else if (noun === 'タカラバコ') {
            if (state.currentRoom === 'dark_room') printLog(state.flags.chestOpened ? "タカラバコ ハ アイテイル。" : "タカラバコ ニハ カギ アナ ガ アル。"); else printLog("ココ ニハ ナイ。");
        } else if (noun === 'メモ' && (items['メモ'].location === state.currentRoom || items['メモ'].location === 'inventory')) { printLog("カミキレ ダ。ナニカ カイテアル。ヨメ ソウダ。");
        } else if (noun === 'テーブル') {
            if (state.currentRoom === 'kitchen') printLog("キ ノ テーブル ダ。ウエ ニハ ナニモ ナイ。"); else printLog("ココ ニハ ナイ。");
        } else if (noun === 'ホンダナ') {
            if (state.currentRoom === 'study') { printLog("ホンダナ オ シラベタ。"); checkHiddenItem('study_books', 'study'); } else printLog("ココ ニハ ナイ。");
        } else if (noun === 'オモチャ') {
            if (state.currentRoom === 'kids_room') { printLog("オモチャバコ オ シラベタ。"); checkHiddenItem('kids_toy', 'kids_room'); } else printLog("ココ ニハ ナイ。");
        } else if (noun === 'ベッド') {
            if (state.currentRoom === 'bedroom') { printLog("ベッド ノ シタ オ シラベタ。"); checkHiddenItem('bed', 'bedroom'); } else printLog("ココ ニハ ナイ。");
        } else if (noun === 'カイダン') {
            if (state.currentRoom === 'hall') printLog("ウエ ヘ ト ツヅク カイダン ダ。"); else if (state.currentRoom === 'corridor_2f') printLog("シタ ヘ オリテイク カイダン ダ。"); else printLog("ココ ニハ ナイ。");
        } else if (items[noun] && (items[noun].location === state.currentRoom || items[noun].location === 'inventory')) { printLog(items[noun].name + " ダ。");
        } else printLog("ソコ ニハ ナニモ ナイ。");
    } else {
        const room = rooms[state.currentRoom]; if (room.examine) { room.examine(); drawCurrentRoom(); } else printLog("トクニ メボシイ モノ ハ ナイ。");
    }
}
function read(noun) {
    if (noun === 'メモ' && (items['メモ'].location === state.currentRoom || items['メモ'].location === 'inventory')) printLog("『クラヤミ デハ ヒ オ トモセ。タカラ ハ ソノ オク ニ アル。』", COLORS.YELLOW); else printLog("ヨメナイ。");
}
function move(dir) {
    const room = rooms[state.currentRoom];
    if (room.exits[dir]) {
        // ウエ、シタ 以外の場合は向きを変える
        if (['キタ','ミナミ','ヒガシ','ニシ'].includes(dir)) {
            if (dir === 'キタ') state.facing = 'N'; if (dir === 'ミナミ') state.facing = 'S';
            if (dir === 'ヒガシ') state.facing = 'E'; if (dir === 'ニシ') state.facing = 'W';
        }
        state.currentRoom = room.exits[dir];
        if (!state.visitedRooms.includes(state.currentRoom)) state.visitedRooms.push(state.currentRoom);
        drawCurrentRoom(); look();
        if (state.currentRoom === 'front' && items['タカラ'].location === 'inventory') {
            state.screen = 'clear'; drawCurrentRoom(); printLog("\n★☆★ オメデトウ！ タカラ オ モッテ ダッシュツ シタ！ ★☆★", COLORS.YELLOW);
        }
    } else {
        if (state.currentRoom === 'front' && dir === 'キタ' && !state.flags.frontDoorOpen) printLog("トビラ ガ シマッテ イル。", COLORS.RED); else printLog("ソッチ ニハ イケナイ。");
    }
}
function take(noun) {
    if (!noun) { printLog("ナニ オ トル？"); return; }
    const item = items[noun];
    if (item) {
        if (item.location === state.currentRoom) {
             if (state.currentRoom === 'dark_room' && !state.flags.darkRoomLight) { printLog("クラク テ ナニモ ミエナイ。"); return; }
             item.location = 'inventory'; printLog(item.name + " オ トッタ。", COLORS.CYAN); drawCurrentRoom();
        } else if (item.location === 'inventory') printLog("スデニ モッテイル。"); else printLog("ココ ニハ ナイ。");
    } else printLog("ソレ ハ トレナイ。");
}
function drop(noun) {
    const item = items[noun];
    if (item && item.location === 'inventory') { item.location = state.currentRoom; printLog(item.name + " オ オトシタ。"); drawCurrentRoom(); } else printLog("ソレ ハ モッテイナイ。");
}
function use(noun) {
    const item = items[noun];
    if (item && item.location === 'inventory') {
        if (noun === 'マッチ') {
            if (state.currentRoom === 'dark_room' && !state.flags.darkRoomLight) { state.flags.darkRoomLight = true; printLog("マッチ オ スリ、アカリ オ ツケタ。ヘヤ ガ アカルク ナッタ！", COLORS.YELLOW); drawCurrentRoom(); look(); } else printLog("ココ デ ツカッテモ イミ ガ ナイ。");
        } else if (noun === 'カギ') {
            if (state.currentRoom === 'dark_room' && state.flags.darkRoomLight) {
                if (!state.flags.chestOpened) { state.flags.chestOpened = true; items['タカラ'].location = 'dark_room'; printLog("カギ ピッタリ ダ！ タカラバコ ガ アイタ！\nナカ カラ タカラ ガ アラワレタ！", COLORS.CYAN); drawCurrentRoom(); } else printLog("タカラバコ ハ モウ アイテイル。");
            } else printLog("ココ デハ ツカエナイ。");
        } else if (noun === 'タカラ') printLog("タカラ オ ナガメタ。マブシイ！", COLORS.CYAN); else printLog("ツカイカタ ガ ワカラナイ。");
    } else printLog("ソレ ハ モッテイナイ。");
}
function open(noun) {
    if (noun === 'ドア' || noun === 'トビラ') {
        if (state.currentRoom === 'front') {
            if (!state.flags.frontDoorOpen) { state.flags.frontDoorOpen = true; rooms['front'].exits['キタ'] = 'hall'; printLog("トビラ ガ アイタ。"); drawCurrentRoom(); } else printLog("スデニ アイテイル。");
        } else printLog("アケラレナイ。");
    } else if (noun === 'レイゾウコ' && state.currentRoom === 'kitchen') {
        if (!state.flags.fridgeOpen) {
            state.flags.fridgeOpen = true; printLog("レイゾウコ オ アケタ。"); drawCurrentRoom(); checkHiddenItem('fridge', 'kitchen');
        } else printLog("スデニ アイテイル。");
    } else if (noun === 'タカラバコ' && state.currentRoom === 'dark_room') {
        if (!state.flags.darkRoomLight) { printLog("クラク テ ナニモ ミエナイ。"); return; }
        if (!state.flags.chestOpened) printLog("カギ ガ カカッテ イテ アカナイ！", COLORS.RED); else printLog("スデニ アイテイル。");
    } else printLog("ソレ ハ アケラレナイ。");
}

    Object.keys(kbData).forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn kb-cat-btn'; btn.id = `kbcat-${cat}`; btn.textContent = cat;
        btn.onclick = () => showKbCategory(cat);
        kbTabs.appendChild(btn);
    });
}
function showKbCategory(catName) {
    const btn = document.getElementById(`kbcat-${catName}`);
    const isAlreadyActive = btn.classList.contains('active');

    document.querySelectorAll('.kb-cat-btn').forEach(b => b.classList.toggle('active', b.id === `kbcat-${catName}`));
    
    // ダブルタップ（既にアクティブな状態でもう一度押された）場合は先頭の文字を入力
    if (isAlreadyActive) {
        typeChar(catName);
        return;
    }

    const container = document.getElementById('kb-items'); container.innerHTML = '';
    kbData[catName].forEach(char => {
        const btn = document.createElement('button'); btn.className = 'item-btn kb-char'; btn.textContent = char;
        btn.onclick = () => typeChar(char); container.appendChild(btn);
    });
}

function typeChar(char) {
    const input = document.getElementById('cmd-input');
    if (char === 'BS') input.value = input.value.slice(0, -1);
    else if (char === '゛') { const map={'カ':'ガ','キ':'ギ','ク':'グ','ケ':'ゲ','コ':'ゴ','サ':'ザ','シ':'ジ','ス':'ズ','セ':'ゼ','ソ':'ゾ','タ':'ダ','チ':'ヂ','ツ':'ヅ','テ':'デ','ト':'ド','ハ':'バ','ヒ':'ビ','フ':'ブ','ヘ':'ベ','ホ':'ボ'}; if(map[input.value.slice(-1)]) input.value = input.value.slice(0, -1) + map[input.value.slice(-1)]; }
    else if (char === '゜') { const map={'ハ':'パ','ヒ':'ピ','フ':'プ','ヘ':'ペ','ホ':'ポ'}; if(map[input.value.slice(-1)]) input.value = input.value.slice(0, -1) + map[input.value.slice(-1)]; }
    else if (char === '小') { const smap={'ア':'ァ','イ':'ィ','ウ':'ゥ','エ':'ェ','オ':'ォ','ヤ':'ャ','ユ':'ュ','ヨ':'ョ','ツ':'ッ'}; const rmap={'ァ':'ア','ィ':'イ','ゥ':'ウ','ェ':'エ','ォ':'オ','ャ':'ヤ','ュ':'ユ','ョ':'ヨ','ッ':'ツ'}; if(smap[input.value.slice(-1)]) input.value = input.value.slice(0, -1) + smap[input.value.slice(-1)]; else if(rmap[input.value.slice(-1)]) input.value = input.value.slice(0, -1) + rmap[input.value.slice(-1)]; }
    else if (char === '空') input.value += ' ';
    else input.value += char;
    checkTyping();
}

document.getElementById('cmd-form').onsubmit = (e) => {
    e.preventDefault(); const input = document.getElementById('cmd-input');
    processCommand(input.value); input.value = ''; input.classList.remove('typing');
};

window.onload = () => {
    initKeyboard();
    showCmdCategory('イドウ');
    showKbCategory('ア'); 
    drawCurrentRoom();
    printLog("「スタート」ト イレテ クダサイ。", COLORS.GREEN);
};
</script>
